<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Philance</title>
    <link rel="stylesheet" href="/css/cadastroLogin.css">
</head>
<body>

    <div class="modal-conteudo">
        <div class="switch-container">
            <button type="button" class="switch-btn ativo" data-tipo="F">Sou freelancer</button>
            <button type="button" class="switch-btn" data-tipo="E">Sou empresa</button>
        </div>
        
        <div class="title-description">
            <h2>Bem-Vindo de Volta</h2>
            <p>Entre na sua conta de freelancer</p>
        </div>

        <input type="hidden" id="letra-cadastro" name="tipo_usuario" value="F">

        <div class="inputs">
            <label>Email:</label>
            <input id="email" type="email" required>
        </div>

        <div class="inputs">
            <label>Senha:</label>
            <input id="password" type="password" required>
        </div>

        <button class="button-cadastro" id="btnLogin" type="submit">Entrar</button>

        <a class="jaTemConta">Não tem conta?<a class="facaLogin" href="/src/pages/cadastro/cadastroE&F.html">Crie sua conta</a></a>

        <script src="/src/pages/login/loginE&F.js"></script>
    </div>

</body>
</html>
