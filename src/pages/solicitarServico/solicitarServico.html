<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/homeEmpresa.css">
    <link rel="stylesheet" href="/css/solicitarServico.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anta&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Idiqlat:wght@200;300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="space-navbar"></div>
    <div class="background">
        <div class="container-form">
            <div class="infos">
                <div class="area-tags">
                    <h3 class="title-tags">Área/Tags</h3>
                    <div class="tags-buttons">
                        <input type="radio" id="garcom-tags" name="tags-garcom" value="garcom" checked>
                        <label for="garcom-tags">Garçom</label>

                        <input type="radio" id="dev-tags" name="tags-dev" value="dev">
                        <label for="dev-tags">Dev</label>

                        <input type="radio" id="entrega-tags" name="tags-entrega" value="entrega">
                        <label for="entrega-tags">Entrega</label>
                        
                        <input type="radio" id="atedimento-tags" name="tags-atedimento" value="atedimento">
                        <label for="atedimento-tags">Atedimento</label>
                    </div>
                </div>
            
                <div class="addresses">
                    <div class="rua-servico">
                        <h2 class="title-rua" >Endereço do Serviço</h2>
                        <input type="text" id="rua" class="input-rua">
                    </div>
                </div>

                <div class="horario-idade">
                    <div class="horario-dia">
                        <div class="horario">
                            <h2 class="title-horario" >Horário/Dia</h2>
                            <input type="datetime-local" id="horario" class="input-horario">
                        </div>
                    </div>

                    <div class="idade-minima">
                        <div class="idade">
                            <h2 class="title-idade" >Idade Mínima</h2>
                            <input type="number" id="min_age" class="input-idade" required>
                        </div>
                    </div>
                </div>

                <div class="duracao-pagamento">
                    <div class="duracao-container">
                        <div class="duracao">
                            <h2 class="title-duracao" >Duração</h2>
                            <input type="time" id="horario" class="input-duracao" required>
                        </div>
                    </div>

                    <div class="pagamento-container">
                        <div class="pagamento">
                            <h2 class="title-pagamento" >Valor do Pagamento</h2>
                            <input type="number" id="payment" class="input-pagamento" required>
                        </div>
                    </div>
                </div>

                <div class="type-vestimenta">
                    <h3 class="title-vestimenta">Vestimenta Exigida</h3>
                    <div class="vestimenta-buttons">
                        <!-- Opção 1 (Já inicia marcada por padrão com 'checked') -->
                        <input type="radio" id="vestimenta-social" name="vestimenta" value="social" checked>
                        <label for="vestimenta-social">Traje Social Escuro</label>

                        <!-- Opção 2 -->
                        <input type="radio" id="vestimenta-casual" name="vestimenta" value="casual">
                        <label for="vestimenta-casual">Casual</label>
                    </div>
                </div>

                <div class="descricao">
                    <h3 class="title-descricao">Descrição Serviço</h3>
                    <div>
                        <input type="text" rows="4" class="input-descricao" id="description">
                    </div>
                </div>

                <button class="btn-publicar" onclick="enviarDadosParaOBackendSolicitar(event, 'vestimenta')">Publicar Serviço</button>
            </div>
        </div>
    </div>

    </div>
    <script>
        document.querySelectorAll('.tags-buttons input[type="radio"]').forEach(radio => {
            radio.addEventListener('click', function() {
                if (this.wasChecked) {
                    this.checked = false;
                    this.wasChecked = false;
                } else {
                    // Remove o estado antigo dos outros do mesmo grupo
                    document.querySelectorAll(`input[name="${this.name}"]`).forEach(r => r.wasChecked = false);
                    this.wasChecked = true;
                }
            });
        });
    </script>
    <script src="/src/pages/solicitarServico/solicitarServico.js"></script>
</body>
<script src="/src/componentes/navbar/navbar.js"></script>
<script>
    carregarNavbarHomeEmpresa();

</script>
</html>
